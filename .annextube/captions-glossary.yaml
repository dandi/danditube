# ===========================================================================
acronyms:
  - term: "BIDS"
    expansion: "Brain Imaging Data Structure"
    patterns: ["bids", "beds", "bits", "b i d s"]
  - term: "NIDM"
    expansion: "Neuroimaging Data Model"
    patterns: ["nidm", "n i d m", "need him", "needem"]
  - term: "FAIR"
    expansion: "Findable, Accessible, Interoperable, Reusable"
    patterns: ["fair", "f a i r"]
  - term: "YODA"
    expansion: "YODAs Organigram on Data Analysis"
    patterns: ["yoda", "y o d a"]
  - term: "fMRI"
    expansion: "functional Magnetic Resonance Imaging"
    patterns: ["f ?mri", "f m r i", "fmri", "functional mri"]
  - term: "MRI"
    expansion: "Magnetic Resonance Imaging"
    patterns: ["mri", "m r i", "m\\.r\\.i\\."]
